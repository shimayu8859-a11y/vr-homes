<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>間取りエディタ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#042C53;
  --blue:#185FA5;
  --blue-mid:#3B82F6;
  --blue-light:#E8F1FB;
  --green:#1D9E75;
  --green-dark:#0F6E56;
  --ink:#1F2A37;
  --ink-soft:#64748B;
  --line:#E4E9F0;
  --surface:#FFFFFF;
  --surface-2:#F5F8FC;
  --radius:8px;
  --radius-sm:6px;
  --shadow-sm:0 1px 2px rgba(16,42,74,.06);
  --shadow-md:0 4px 16px rgba(16,42,74,.10);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--surface-2);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
h1{font-size:15px;font-weight:600;padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--line);color:var(--navy);letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.toolbar{display:flex;gap:6px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center;box-shadow:var(--shadow-sm)}
.btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all .13s ease;font-family:inherit}
.btn:hover{background:var(--surface-2);border-color:#CBD6E4}
.btn.active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#14508c}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.success:hover{background:var(--green-dark)}
.btn.danger{background:#EF4444;color:#fff;border-color:#DC2626}
.zoom-bar{display:flex;gap:4px;align-items:center;margin-left:8px}
/* ドア種類サブツールバー(ドアモード時のみ表示) */
.subtoolbar{display:none;align-items:center;gap:6px;padding:7px 14px;background:var(--blue-light);border-bottom:1px solid var(--line);flex-wrap:wrap}
.subtoolbar.show{display:flex}
.sub-label{font-size:12px;font-weight:600;color:var(--blue);white-space:nowrap}
.sub-hint{font-size:11px;color:var(--ink-soft);margin-left:auto}
.doortype-btn{padding:5px 11px;border-radius:var(--radius-sm);border:1px solid #B9D4EE;background:var(--surface);color:var(--ink);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all .13s}
.doortype-btn:hover{border-color:var(--blue);background:#fff}
.doortype-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.zoom-btn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .13s}
.zoom-btn:hover{background:var(--surface-2);color:var(--blue)}
.zoom-label{font-size:11px;color:var(--ink-soft);min-width:36px;text-align:center}
.main{display:flex;flex:1;overflow:hidden}
.left-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--line);min-width:0}
.right-panel{width:44%;display:flex;flex-direction:column;background:#0F1B2D;transition:width .25s ease;flex-shrink:0}
/* 3Dパネル 折りたたみ */
.right-panel.collapsed{width:0;overflow:hidden;border:none}
.left-panel.full{width:100%}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--surface);min-height:0}
canvas.map-canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#threeCanvas{width:100%;height:100%;display:block}
.status-bar{padding:6px 12px;font-size:11px;color:var(--ink-soft);background:var(--surface-2);border-top:1px solid var(--line)}
.three-toolbar{display:flex;gap:6px;padding:8px 12px;background:#0A1420;border-bottom:1px solid #1C2E44}
.three-btn{padding:5px 11px;border-radius:var(--radius-sm);border:1px solid #1C2E44;background:#132238;color:#9FB3CC;cursor:pointer;font-size:11px;font-weight:500;transition:all .13s}
.three-btn:hover{background:#1C2E44;color:#fff}
.three-btn.active{background:var(--green);color:#fff;border-color:var(--green-dark)}
.furniture-panel{padding:10px 14px;background:var(--surface);border-top:1px solid var(--line);max-height:160px;overflow-y:auto}
.furniture-panel h3{font-size:12px;color:var(--ink-soft);margin-bottom:6px;font-weight:500}
.furniture-cats{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.cat-btn{padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:500;color:var(--ink-soft);transition:all .13s}
.cat-btn.active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.furniture-grid{display:flex;gap:4px;flex-wrap:wrap}
.furniture-item{border:1px solid #ddd;border-radius:6px;padding:4px 6px;text-align:center;cursor:pointer;font-size:10px;background:#fff;min-width:56px}
.furniture-item:hover{background:#f0f0f0}
.furniture-item.active{background:#e0f5ee;border-color:#1D9E75}
.furniture-item .icon{font-size:16px;display:block}
/* ━━━ 背景写真コントロール ━━━ */
.bg-controls{display:flex;gap:4px;align-items:center;padding:0 8px;border-left:1px solid #ddd;border-right:1px solid #ddd;margin-left:4px}
.bg-controls input[type=range]{width:60px}
.bg-controls .file-btn{padding:4px 8px;font-size:11px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;white-space:nowrap}
.bg-controls .file-btn:hover{background:#f0f0f0}
.bg-controls .bg-label{font-size:10px;color:#888}
.bg-controls .bg-clear{padding:2px 6px;font-size:11px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#c0392b}
/* ━━━ 埋め込みモード用の保存バー(初期非表示) ━━━ */
.save-bar{display:none;gap:8px;padding:8px 12px;background:#fafafa;border-top:1px solid #ddd;justify-content:flex-end;align-items:center}
.save-bar.show{display:flex}
.save-bar .save-info{font-size:11px;color:#888;margin-right:auto}
.save-bar .btn-big{padding:8px 16px;font-size:13px;font-weight:600}
/* ━━━ VR内見モード(自動送信)のオーバーレイ ━━━ */
#vrModeOverlay{position:fixed;inset:0;background:rgba(15,25,35,.85);color:#fff;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#vrModeOverlay.show{display:flex}
#vrModeOverlay .vr-emoji{font-size:48px;margin-bottom:14px}
#vrModeOverlay .vr-title{font-size:20px;font-weight:600;margin-bottom:8px}
#vrModeOverlay .vr-desc{font-size:13px;opacity:.8;max-width:420px;line-height:1.7;margin-bottom:24px}
#vrModeOverlay .vr-prop{font-size:14px;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:20px;margin-bottom:18px}
#vrModeOverlay .vr-btn{padding:10px 20px;border-radius:8px;background:#10B981;color:#fff;border:none;font-size:13px;cursor:pointer;font-weight:600}
#vrModeOverlay .vr-btn.secondary{background:transparent;border:1px solid rgba(255,255,255,.4);margin-left:10px}
/* ━━━ 背景画像の調整バー(編集モード時に表示) ━━━ */
.bg-transform-bar{
  display:none;
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.97);
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px 12px;
  box-shadow:0 4px 14px rgba(0,0,0,.18);
  z-index:20;
  gap:10px;
  align-items:center;
  font-size:11px;
  color:#444;
  white-space:nowrap;       /* ★文字が縦に折り返されないように */
  max-width:calc(100% - 28px); /* キャンバスからはみ出ない */
}
.bg-transform-bar > * {
  flex-shrink:0;             /* 内部要素を縮ませない */
}
.bg-transform-bar span {
  white-space:nowrap;
}
.bg-transform-bar.show{display:flex}
.bg-transform-bar input[type=range]{width:110px;accent-color:#1D9E75}
.bg-transform-bar .bt-label{color:#1D9E75;font-family:ui-monospace,monospace;min-width:42px;text-align:right;font-weight:600}
.bg-transform-bar button{padding:4px 10px;border-radius:5px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:11px;white-space:nowrap}
.bg-transform-bar button:hover{background:#f0f0f0;border-color:#1D9E75;color:#1D9E75}
.bg-transform-bar .bt-divider{width:1px;height:18px;background:#ddd}
.bg-transform-bar .bt-hint{color:#888;font-size:10px}
</style>
</head>
<body>
<h1 id="pageTitle">🏠 間取りエディタ + 3Dプレビュー</h1>
<div class="toolbar">
  <button class="btn active" id="modeRect" onclick="setMode('rect')">⬜ 囲み</button>
  <button class="btn" id="modeVertex" onclick="setMode('vertex')">✏️ 頂点</button>
  <button class="btn" id="modeEdit" onclick="setMode('edit')">🔧 編集</button>
  <button class="btn" id="modeDoor" onclick="setMode('door')">🚪 ドア</button>
  <button class="btn" id="modeWindow" onclick="setMode('window')">🪟 窓</button>
  <button class="btn" id="modePassage" onclick="setMode('passage')">🚧 通路</button>
  <button class="btn" id="modeWall" onclick="setMode('wall')">🧱 壁</button>
  <button class="btn" id="modeFurniture" onclick="setMode('furniture')">🛋 家具</button>
  <button class="btn" id="modePan" onclick="setMode('pan')">✋ 移動</button>
  <button class="btn" id="modeBg" onclick="setMode('bg')" style="display:none">🖼 背景調整</button>
  <button class="btn" id="modeScale" onclick="setMode('scale')">📐 全体サイズ</button>
  <button class="btn" onclick="clearAll()">🗑</button>
  <button class="btn primary" onclick="sendData()">▶ Unity送信</button>
  <!-- 背景写真コントロール -->
  <div class="bg-controls" title="間取り図の写真を背景に敷いて、その上をなぞって描画できます">
    <label class="file-btn">
      📷 背景写真
      <input type="file" id="bgFile" accept="image/*" style="display:none">
    </label>
    <span class="bg-label" id="bgOpacityLabel" style="display:none">50%</span>
    <input type="range" id="bgOpacity" min="0" max="100" value="50" style="display:none">
    <button class="bg-clear" id="bgClear" style="display:none">✕</button>
  </div>
  <button class="btn" id="toggle3D" onclick="toggle3DPanel()" style="margin-left:auto">🧊 3Dビュー</button>
  <div class="zoom-bar">
    <button class="zoom-btn" onclick="zoomIn()">＋</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="zoom-btn" onclick="zoomOut()">－</button>
    <button class="zoom-btn" onclick="resetView()">⌂</button>
  </div>
</div>
<!-- ドアモード時だけ表示: ドア種類選択サブツールバー -->
<div class="subtoolbar" id="doorSubtoolbar">
  <span class="sub-label">🚪 設置するドアの種類:</span>
  <button class="doortype-btn active" data-dt="swing_left"      onclick="selectDoorType('swing_left',this)">↙ 左開き(内)</button>
  <button class="doortype-btn"        data-dt="swing_left_out"  onclick="selectDoorType('swing_left_out',this)">↖ 左開き(外)</button>
  <button class="doortype-btn"        data-dt="swing_right"     onclick="selectDoorType('swing_right',this)">↘ 右開き(内)</button>
  <button class="doortype-btn"        data-dt="swing_right_out" onclick="selectDoorType('swing_right_out',this)">↗ 右開き(外)</button>
  <button class="doortype-btn"        data-dt="slide_left"      onclick="selectDoorType('slide_left',this)">⇤ 引き戸(左)</button>
  <button class="doortype-btn"        data-dt="slide_right"     onclick="selectDoorType('slide_right',this)">⇥ 引き戸(右)</button>
  <span class="sub-hint">設置後も一覧から個別に変更できます</span>
</div>
<div class="main">
  <!-- 左：2D -->
  <div class="left-panel">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas class="map-canvas" id="c"></canvas>
      <!-- 背景画像の移動・スケール用の floating バー -->
      <div class="bg-transform-bar" id="bgTransformBar">
        <span class="bt-hint">背景:</span>
        <span>サイズ</span>
        <input type="range" id="bgScaleSlider" min="10" max="500" value="100">
        <input type="number" id="bgScaleInput" min="10" max="500" step="1" value="100"
               style="width:54px;padding:2px 4px;font-size:11px;border:1px solid #ddd;border-radius:4px;text-align:center">
        <span class="bt-label">%</span>
        <div class="bt-divider"></div>
        <button onclick="resetBgTransform()">↺ リセット</button>
        <button onclick="fitBgToCanvas()">⛶ 中央フィット</button>
        <div class="bt-divider"></div>
        <span class="bt-hint">ドラッグで移動 / ホイールで拡縮</span>
      </div>
      <!-- 全体サイズ調整用の floating バー -->
      <div class="bg-transform-bar" id="scaleTransformBar">
        <span class="bt-hint">全体サイズ:</span>
        <input type="range" id="globalScaleSlider" min="10" max="500" value="100">
        <input type="number" id="globalScaleInput" min="10" max="500" step="1" value="100"
               style="width:54px;padding:2px 4px;font-size:11px;border:1px solid #ddd;border-radius:4px;text-align:center">
        <span class="bt-label">%</span>
        <div class="bt-divider"></div>
        <button onclick="resetGlobalScale()">↺ リセット</button>
        <div class="bt-divider"></div>
        <span class="bt-hint">部屋・壁・家具を一括で拡縮</span>
      </div>
    </div>
    <div class="furniture-panel" id="furniturePanel" style="display:none">
      <h3>🛋 家具を選んでクリック配置 / ドラッグで移動 / Rキーで回転</h3>
      <div class="furniture-cats">
        <button class="cat-btn active" onclick="selectCat('living',this)">リビング</button>
        <button class="cat-btn" onclick="selectCat('bedroom',this)">寝室</button>
        <button class="cat-btn" onclick="selectCat('kitchen',this)">キッチン</button>
        <button class="cat-btn" onclick="selectCat('bath',this)">浴室</button>
        <button class="cat-btn" onclick="selectCat('other',this)">その他</button>
      </div>
      <div class="furniture-grid" id="furnitureGrid"></div>
    </div>
    <div id="roomList" style="height:150px;overflow-y:auto;border-top:2px solid var(--blue);background:var(--surface-2);font-size:11px;flex-shrink:0"></div>
    <div class="status-bar" id="status">囲みモード：ドラッグで部屋を描く</div>
  </div>
  <!-- 右：3D -->
  <div class="right-panel collapsed" id="rightPanel">
    <div class="three-toolbar">
      <span style="color:#aaa;font-size:11px;margin-right:4px">3Dビュー</span>
      <button class="three-btn" onclick="resetCamera()">カメラリセット</button>
      <button class="three-btn active" id="btnTopView" onclick="setTopView()">真上</button>
      <button class="three-btn" id="btnPerspView" onclick="setPerspView()">透視</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="threeCanvas"></canvas>
    </div>
  </div>
</div>
<!-- 埋め込みモード時に表示される保存バー -->
<div class="save-bar" id="saveBar">
  <div class="save-info" id="saveInfo">物件アプリから開かれています</div>
  <button class="btn btn-big" onclick="cancelEdit()">キャンセル</button>
  <button class="btn btn-big success" onclick="saveAndClose()">💾 保存して反映</button>
</div>

<!-- VR内見モード(自動送信)用オーバーレイ -->
<div id="vrModeOverlay">
  <div class="vr-emoji">🥽</div>
  <div class="vr-title">VRで内見中</div>
  <div class="vr-prop" id="vrPropName">−</div>
  <div class="vr-desc" id="vrDesc">
    Quest 3 を装着すると、間取りデータが自動で読み込まれます。<br>
    Unity側で <code>FloorplanReceiver</code> が2秒ごとにポーリングしています。
  </div>
  <div>
    <button class="vr-btn" onclick="resendVR()">🔄 もう一度送信</button>
    <button class="vr-btn secondary" onclick="cancelEdit()">閉じる</button>
  </div>
</div>

<script>

/* ━━━ 親ページとの postMessage 通信 ━━━ */
function postToParent(msg){
  try{
    if(window.parent!==window){
      window.parent.postMessage(msg, '*');
    }
  }catch(e){console.warn('postToParent failed:',e);}
}

window.addEventListener('message', function(e){
  var msg=e.data;
  if(!msg||typeof msg!=='object'||!msg.type) return;
  if(msg.type==='init'){
    /* 親からの初期化 */
    EMBED_MODE=true;
    CURRENT_PROP_NAME = msg.propName||'';
    document.getElementById('saveBar').classList.add('show');
    if(CURRENT_PROP_NAME){
      document.getElementById('pageTitle').textContent='🏠 '+CURRENT_PROP_NAME+' の間取り';
      document.getElementById('saveInfo').textContent=CURRENT_PROP_NAME+' を編集中';
      document.getElementById('vrPropName').textContent=CURRENT_PROP_NAME;
    }
    /* 既存データを読み込み */
    if(msg.data && typeof msg.data==='object'){
      try{
        if(Array.isArray(msg.data.rooms)){
          rooms = msg.data.rooms.map(function(r){return Object.assign({},r);});
          roomCount = rooms.reduce(function(m,r){return Math.max(m,(r.id||0)+1);},0);
        }
        if(Array.isArray(msg.data.furnitures)){
          furnitures = msg.data.furnitures.map(function(f){return Object.assign({},f);});
          furnitureCount = furnitures.reduce(function(m,f){return Math.max(m,(f.id||0)+1);},0);
        }
        if(Array.isArray(msg.data.walls)){
          walls = msg.data.walls.map(function(w){return Object.assign({},w);});
          nextWallId = walls.reduce(function(m,w){return Math.max(m,(w.id||0)+1);},0);
        }
        draw(); rebuild3D(); renderRoomList();
      }catch(err){console.error('既存データの読み込みに失敗:',err);}
    }
    /* VRで見るモード:UIを切り替えて自動送信 */
    if(msg.mode==='view' || msg.autoSendToVR){
      VR_VIEW_MODE=true;
      enterVRViewMode();
    }
  }
});

/* ━━━ サムネイル生成 (200x150のPNG dataURL) ━━━ */
function generateThumbnail(){
  if(rooms.length===0 && furnitures.length===0) return null;
  var W=240,H=180;
  var tc=document.createElement('canvas');
  tc.width=W; tc.height=H;
  var tx=tc.getContext('2d');
  /* 全要素のbounding box */
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  rooms.forEach(function(r){
    if(r.vertices&&r.vertices.length>0){
      r.vertices.forEach(function(v){
        minX=Math.min(minX,v.x); minY=Math.min(minY,v.y);
        maxX=Math.max(maxX,v.x); maxY=Math.max(maxY,v.y);
      });
    } else {
      minX=Math.min(minX,r.wx); minY=Math.min(minY,r.wy);
      maxX=Math.max(maxX,r.wx+r.ww); maxY=Math.max(maxY,r.wy+r.wh);
    }
  });
  furnitures.forEach(function(f){
    minX=Math.min(minX,f.cx-f.pw/2); minY=Math.min(minY,f.cy-f.ph/2);
    maxX=Math.max(maxX,f.cx+f.pw/2); maxY=Math.max(maxY,f.cy+f.ph/2);
  });
  if(!isFinite(minX)||maxX-minX<=0||maxY-minY<=0) return null;
  var pad=10;
  var s=Math.min((W-pad*2)/(maxX-minX),(H-pad*2)/(maxY-minY));
  var ox=(W - (maxX-minX)*s)/2 - minX*s;
  var oy=(H - (maxY-minY)*s)/2 - minY*s;
  tx.fillStyle='#ffffff';
  tx.fillRect(0,0,W,H);
  tx.save();
  tx.translate(ox,oy);
  tx.scale(s,s);
  rooms.forEach(function(r){
    if(r.vertices&&r.vertices.length>=3){
      tx.beginPath(); tx.moveTo(r.vertices[0].x,r.vertices[0].y);
      for(var i=1;i<r.vertices.length;i++) tx.lineTo(r.vertices[i].x,r.vertices[i].y);
      tx.closePath();
      tx.fillStyle=r.color+'44'; tx.fill();
      tx.strokeStyle=r.color; tx.lineWidth=2/s; tx.stroke();
    } else {
      tx.fillStyle=r.color+'44'; tx.fillRect(r.wx,r.wy,r.ww,r.wh);
      tx.strokeStyle=r.color; tx.lineWidth=2/s; tx.strokeRect(r.wx,r.wy,r.ww,r.wh);
    }
  });
  furnitures.forEach(function(f){
    tx.save();
    tx.translate(f.cx,f.cy);
    tx.rotate((f.rotation||0)*Math.PI/180);
    tx.fillStyle=f.color+'cc';
    tx.fillRect(-f.pw/2,-f.ph/2,f.pw,f.ph);
    tx.restore();
  });
  tx.restore();
  return tc.toDataURL('image/png');
}

/* ━━━ 背景画像のスケール適用(キャンバス中央基準) ━━━ */
function applyBgScale(newScale){
  if(!bgImage) return;
  var cx=canvas.width/2, cy=canvas.height/2;
  var w=toWorld(cx,cy);
  bgX = w.x - (w.x - bgX) * (newScale/bgScale);
  bgY = w.y - (w.y - bgY) * (newScale/bgScale);
  bgScale=newScale;
  var pct=Math.round(bgScale*100);
  var sl=document.getElementById('bgScaleSlider'); if(sl) sl.value=pct;
  var inp=document.getElementById('bgScaleInput'); if(inp) inp.value=pct;
  draw();
}
document.getElementById('bgScaleSlider').addEventListener('input', function(e){
  applyBgScale(parseInt(e.target.value)/100);
});
document.getElementById('bgScaleInput').addEventListener('input', function(e){
  var pct=parseInt(e.target.value);
  if(isNaN(pct)) return;
  pct=Math.max(10,Math.min(500,pct));
  applyBgScale(pct/100);
});
document.getElementById('bgScaleInput').addEventListener('change', function(e){
  var pct=parseInt(e.target.value);
  if(isNaN(pct)) pct=100;
  pct=Math.max(10,Math.min(500,pct));
  e.target.value=pct;
  applyBgScale(pct/100);
});

/* ━━━ 背景画像のリセット ━━━ */
function resetBgTransform(){
  if(!bgImage) return;
  bgX=0; bgY=0; bgScale=1;
  document.getElementById('bgScaleSlider').value=100;
  document.getElementById('bgScaleInput').value=100;

/* ━━━ 背景画像をキャンバスにフィット ━━━ */
function fitBgToCanvas(){
  if(!bgImage) return;
  /* キャンバスのワールド座標範囲を計算 */
  var cwWorld = canvas.width / scale;
  var chWorld = canvas.height / scale;
  /* キャンバスの70%サイズに収まるようスケール計算 */
  var target = Math.min(cwWorld, chWorld) * 0.7;
  var s = Math.min(target / bgImage.width, target / bgImage.height);
  bgScale = s;
  /* キャンバスの中央に配置 */
  var worldCx = (-offsetX + canvas.width/2) / scale;
  var worldCy = (-offsetY + canvas.height/2) / scale;
  bgX = worldCx - (bgImage.width * s) / 2;
  bgY = worldCy - (bgImage.height * s) / 2;
  /* スライダー同期 */
  var pct = Math.round(bgScale*100);
  document.getElementById('bgScaleSlider').min = Math.min(10, pct);
  document.getElementById('bgScaleSlider').max = Math.max(500, pct*3);
  document.getElementById('bgScaleSlider').value = pct;
  var bgFitInp=document.getElementById('bgScaleInput'); if(bgFitInp) bgFitInp.value=pct;
  draw();
}

/* ===== Three.js ===== */
var threeCanvas=document.getElementById('threeCanvas');
var renderer,scene,camera,controls3d;
var threeMeshes={rooms:[],furniture:[]};
var isTopView=true;
var mouseDown3d=false,lastMouse3d={x:0,y:0};
var cameraTheta=0,cameraPhi=Math.PI/3,cameraRadius=20;
var cameraTarget=new THREE.Vector3(5,0,5);
function initThree(){
  renderer=new THREE.WebGLRenderer({canvas:threeCanvas,antialias:true});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled=true;
  renderer.setClearColor(0x1a1a2e);
  scene=new THREE.Scene();
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  var dirLight=new THREE.DirectionalLight(0xffffff,0.8);
  dirLight.position.set(10,20,10);
  dirLight.castShadow=true;
  scene.add(dirLight);
  var grid=new THREE.GridHelper(50,50,0x333366,0x333366);
  scene.add(grid);
  camera=new THREE.PerspectiveCamera(60,1,0.1,500);
  setTopView();
  var mouseButton3d=-1;
  threeCanvas.addEventListener('mousedown',function(e){
    e.preventDefault();
    mouseButton3d=e.button;
    lastMouse3d={x:e.clientX,y:e.clientY};
  });
  threeCanvas.addEventListener('contextmenu',function(e){e.preventDefault();});
  threeCanvas.addEventListener('mousemove',function(e){
    if(mouseButton3d<0)return;
    var dx=e.clientX-lastMouse3d.x,dy=e.clientY-lastMouse3d.y;
    lastMouse3d={x:e.clientX,y:e.clientY};
    if(mouseButton3d===0){
      var right=new THREE.Vector3();
      var forward=new THREE.Vector3();
      right.crossVectors(camera.getWorldDirection(new THREE.Vector3()),camera.up).normalize();
      forward.copy(camera.getWorldDirection(new THREE.Vector3()));
      forward.y=0;forward.normalize();
      var moveSpeed=0.05*cameraRadius/10;
      cameraTarget.addScaledVector(right,-dx*moveSpeed);
      cameraTarget.addScaledVector(forward,dy*moveSpeed);
      updateCamera();
    } else if(mouseButton3d===2){
      if(!isTopView){
        cameraTheta-=dx*0.01;
        cameraPhi=Math.max(0.1,Math.min(Math.PI/2-0.05,cameraPhi-dy*0.01));
        updateCamera();
      }
    }
  });
  threeCanvas.addEventListener('mouseup',function(){mouseButton3d=-1;});
  threeCanvas.addEventListener('wheel',function(e){
    cameraRadius=Math.max(3,Math.min(80,cameraRadius+e.deltaY*0.05));
    updateCamera();
  });
  animate();
}
function setTopView(){
  isTopView=true;
  camera.position.set(cameraTarget.x,30,cameraTarget.z);
  camera.lookAt(cameraTarget);
  document.getElementById('btnTopView').classList.add('active');
  document.getElementById('btnPerspView').classList.remove('active');
}
function setPerspView(){
  isTopView=false;
  updateCamera();
  document.getElementById('btnTopView').classList.remove('active');
  document.getElementById('btnPerspView').classList.add('active');
}
function updateCamera(){
  if(isTopView){setTopView();return;}
  camera.position.set(
    cameraTarget.x+cameraRadius*Math.sin(cameraTheta)*Math.cos(cameraPhi),
    cameraRadius*Math.sin(cameraPhi),
    cameraTarget.z+cameraRadius*Math.cos(cameraTheta)*Math.cos(cameraPhi)
  );
  camera.lookAt(cameraTarget);
}
function resetCamera(){
  cameraRadius=20;cameraTheta=0;cameraPhi=Math.PI/3;
  cameraTarget.set(5,0,5);
  if(isTopView)setTopView();else updateCamera();
}
function animate(){
  requestAnimationFrame(animate);
  var w=threeCanvas.parentElement.clientWidth;
  var h=threeCanvas.parentElement.clientHeight;
  /* パネルが閉じている(幅0)ときは描画スキップ */
  if(w<10||h<10) return;
  if(renderer.domElement.width!==w||renderer.domElement.height!==h){
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  }
  renderer.render(scene,camera);
}
/* ━━━ 3Dパネルの開閉トグル ━━━ */
function toggle3DPanel(){
  var panel=document.getElementById('rightPanel');
  var btn=document.getElementById('toggle3D');
  var isCollapsed=panel.classList.toggle('collapsed');
  if(isCollapsed){
    btn.classList.remove('active');
  } else {
    btn.classList.add('active');
    rebuild3D();
  }
  /* ★重要: パネル幅が変わるので2Dキャンバスの内部解像度を再計算
     (これをしないとクリック座標がズレて壁などが変な位置に出る) */
  resize2d();
  /* transition(0.25s)完了後にもう一度合わせる */
  setTimeout(function(){
    resize2d();
    if(!isCollapsed && typeof resetCamera==='function') resetCamera();
  }, 280);
}
function rebuild3D(){
  threeMeshes.rooms.forEach(function(m){scene.remove(m);});
  threeMeshes.furniture.forEach(function(m){scene.remove(m);});
  threeMeshes.rooms=[];threeMeshes.furniture=[];
  var wallH=2.4,wallT=0.1;
  rooms.forEach(function(r){
    var col=new THREE.Color(r.color);
    var wallMat=new THREE.MeshLambertMaterial({color:0xcccccc,opacity:0.8,transparent:true});
    var floorMat=new THREE.MeshLambertMaterial({color:col,opacity:0.4,transparent:true});
    if(r.vertices&&r.vertices.length>=3){
      var verts=r.vertices;
      var n=verts.length;
      var shape=new THREE.Shape();
      shape.moveTo(verts[0].x/BASE_SCALE, verts[0].y/BASE_SCALE);
      for(var i=1;i<n;i++) shape.lineTo(verts[i].x/BASE_SCALE, verts[i].y/BASE_SCALE);
      shape.closePath();
      var floorGeo=new THREE.ShapeGeometry(shape);
      var floorMesh=new THREE.Mesh(floorGeo,floorMat);
      floorMesh.rotation.x=-Math.PI/2;
      floorMesh.position.y=0.025;
      scene.add(floorMesh);threeMeshes.rooms.push(floorMesh);
      for(var i=0;i<n;i++){
        var j=(i+1)%n;
        var x1=verts[i].x/BASE_SCALE, z1=verts[i].y/BASE_SCALE;
        var x2=verts[j].x/BASE_SCALE, z2=verts[j].y/BASE_SCALE;
        var len=Math.sqrt((x2-x1)*(x2-x1)+(z2-z1)*(z2-z1));
        if(len<0.01)continue;
        var midX=(x1+x2)/2, midZ=(z1+z2)/2;
        var angle=Math.atan2(x2-x1,z2-z1);
        var edgeOpen=null;
        (r.openings||[]).forEach(function(o){
          if(o.edgeIndex===i){
            edgeOpen={type:o.type,along:o.offsetAlongWall>0?o.offsetAlongWall:0.5,width:o.width,height:o.height||(o.type==='window'?1.0:2.0),doorType:o.doorType||'swing_left'};
          }
        });
        if(!edgeOpen){
          var geo=new THREE.BoxGeometry(wallT,wallH,len);
          var mesh=new THREE.Mesh(geo,wallMat);
          mesh.position.set(midX,wallH/2,midZ);
          mesh.rotation.y=angle;
          scene.add(mesh);threeMeshes.rooms.push(mesh);
        } else {
          var sill=edgeOpen.type==='window'?0.9:0;
          var dCenter=edgeOpen.along*len;
          var dLeft=dCenter-edgeOpen.width/2, dRight=dCenter+edgeOpen.width/2;
          var dx=(x2-x1)/len, dz=(z2-z1)/len;
          if(dLeft>0.01){
            var lLen=dLeft, lMidX=x1+dx*lLen/2, lMidZ=z1+dz*lLen/2;
            var g=new THREE.BoxGeometry(wallT,wallH,lLen);var m=new THREE.Mesh(g,wallMat);
            m.position.set(lMidX,wallH/2,lMidZ);m.rotation.y=angle;scene.add(m);threeMeshes.rooms.push(m);
          }
          if(len-dRight>0.01){
            var rLen=len-dRight, rMidX=x1+dx*(dRight+rLen/2), rMidZ=z1+dz*(dRight+rLen/2);
            var g=new THREE.BoxGeometry(wallT,wallH,rLen);var m=new THREE.Mesh(g,wallMat);
            m.position.set(rMidX,wallH/2,rMidZ);m.rotation.y=angle;scene.add(m);threeMeshes.rooms.push(m);
          }
          var openTop=sill+edgeOpen.height;
          var topH=wallH-openTop;
          if(topH>0.01){
            var tMidX=x1+dx*dCenter, tMidZ=z1+dz*dCenter;
            var g=new THREE.BoxGeometry(wallT,topH,edgeOpen.width);var m=new THREE.Mesh(g,wallMat);
            m.position.set(tMidX,openTop+topH/2,tMidZ);m.rotation.y=angle;scene.add(m);threeMeshes.rooms.push(m);
          }
          if(sill>0.01){
            var bMidX=x1+dx*dCenter, bMidZ=z1+dz*dCenter;
            var g=new THREE.BoxGeometry(wallT,sill,edgeOpen.width);var m=new THREE.Mesh(g,wallMat);
            m.position.set(bMidX,sill/2,bMidZ);m.rotation.y=angle;scene.add(m);threeMeshes.rooms.push(m);
          }
          var oMidX=x1+dx*dCenter, oMidZ=z1+dz*dCenter;
          if(edgeOpen.type==='window'){
            var g=new THREE.BoxGeometry(0.05,edgeOpen.height,edgeOpen.width);
            var mat=new THREE.MeshLambertMaterial({color:0x87CEEB,opacity:0.5,transparent:true});
            var m=new THREE.Mesh(g,mat);m.position.set(oMidX,sill+edgeOpen.height/2,oMidZ);m.rotation.y=angle;
            scene.add(m);threeMeshes.rooms.push(m);
          } else if(edgeOpen.type==='door') {
            /* ドアタイプで色分け: slide=緑系, swing_left/_out=茶, swing_right/_out=濃茶 */
            var dt = edgeOpen.doorType||'swing_left';
            var isSlide = (dt==='slide'||dt==='slide_left'||dt==='slide_right');
            var isRightHinge = (dt==='swing_right'||dt==='swing_right_out');
            var doorColor = isSlide ? 0x4FA478
                          : isRightHinge ? 0x6B3410
                          : 0x8B4513;
            var g=new THREE.BoxGeometry(0.05,edgeOpen.height,edgeOpen.width);
            var mat=new THREE.MeshLambertMaterial({color:doorColor});
            var m=new THREE.Mesh(g,mat);m.position.set(oMidX,edgeOpen.height/2,oMidZ);m.rotation.y=angle;
            scene.add(m);threeMeshes.rooms.push(m);
            /* 開き方向のヒント線(スイングドアのみ): ヒンジ側から床に小さなマーカー */
            if(!isSlide){
              var isLeftHinge = !isRightHinge;
              var hingeSign = isLeftHinge ? -1 : 1;
              var hingeX = oMidX + dx*(hingeSign*edgeOpen.width/2);
              var hingeZ = oMidZ + dz*(hingeSign*edgeOpen.width/2);
              var markGeo=new THREE.SphereGeometry(0.08,8,6);
              /* 内開き=橙、外開き=水色 */
              var isOut = (dt==='swing_left_out'||dt==='swing_right_out');
              var markMat=new THREE.MeshLambertMaterial({color: isOut ? 0x38BDF8 : 0xff6600});
              var mark=new THREE.Mesh(markGeo,markMat);
              mark.position.set(hingeX, 0.08, hingeZ);
              scene.add(mark);threeMeshes.rooms.push(mark);
            } else {
              /* 引き戸: スライド方向の床マーカー(緑) */
              var slideSign = dt==='slide_right' ? 1 : -1;
              var slideX = oMidX + dx*(slideSign*edgeOpen.width/2);
              var slideZ = oMidZ + dz*(slideSign*edgeOpen.width/2);
              var smGeo=new THREE.SphereGeometry(0.06,8,6);
              var smMat=new THREE.MeshLambertMaterial({color:0x10B981});
              var sm=new THREE.Mesh(smGeo,smMat);
              sm.position.set(slideX, 0.06, slideZ);
              scene.add(sm);threeMeshes.rooms.push(sm);
            }
          }
        }
      }
    } else {
      var rx=r.wx/BASE_SCALE, rz=r.wy/BASE_SCALE;
      var rw=r.ww/BASE_SCALE, rd=r.wh/BASE_SCALE;
      var cx=rx+rw/2, cz=rz+rd/2;
      var floorGeo=new THREE.BoxGeometry(rw,0.05,rd);
      var floor=new THREE.Mesh(floorGeo,floorMat);
      floor.position.set(cx,0,cz);
      scene.add(floor);threeMeshes.rooms.push(floor);
      var doorHoles=[];
      (r.openings||[]).forEach(function(o){
        if(o.type==='door'||o.type==='passage'){
          var isNS=o.wall==='North'||o.wall==='South';
          var wallLen=isNS?rw:rd;
          var along=(o.offsetAlongWall>0?o.offsetAlongWall:0.5)*wallLen;
          doorHoles.push({wall:o.wall,center:along,width:o.width,height:o.height||2.0,doorType:o.doorType,type:o.type});
        }
      });
      var wallDefs=[
        {dir:'North', len:rw, isNS:true,  wallX:cx,       wallZ:cz-rd/2, start:cx-rw/2},
        {dir:'South', len:rw, isNS:true,  wallX:cx,       wallZ:cz+rd/2, start:cx-rw/2},
        {dir:'East',  len:rd, isNS:false, wallX:cx+rw/2,  wallZ:cz,      start:cz-rd/2},
        {dir:'West',  len:rd, isNS:false, wallX:cx-rw/2,  wallZ:cz,      start:cz-rd/2},
      ];
      wallDefs.forEach(function(wd){
        var holes=doorHoles.filter(function(h){return h.wall===wd.dir;});
        if(holes.length===0){
          var geo=new THREE.BoxGeometry(
            wd.isNS?wd.len:wallT, wallH, wd.isNS?wallT:wd.len
          );
          var mesh=new THREE.Mesh(geo,wallMat);
          mesh.position.set(wd.wallX, wallH/2, wd.wallZ);
          scene.add(mesh);threeMeshes.rooms.push(mesh);
        } else {
          holes.forEach(function(h){
            var wallStart=wd.start;
            var wallEnd=wallStart+wd.len;
            var holeLeft=wallStart+h.center-h.width/2;
            var holeRight=wallStart+h.center+h.width/2;
            var holeCenter=wallStart+h.center;
            var leftLen=holeLeft-wallStart;
            if(leftLen>0.01){
              var lc=wallStart+leftLen/2;
              var geo=new THREE.BoxGeometry(wd.isNS?leftLen:wallT,wallH,wd.isNS?wallT:leftLen);
              var m=new THREE.Mesh(geo,wallMat);
              m.position.set(wd.isNS?lc:wd.wallX, wallH/2, wd.isNS?wd.wallZ:lc);
              scene.add(m);threeMeshes.rooms.push(m);
            }
            var rightLen=wallEnd-holeRight;
            if(rightLen>0.01){
              var rc=holeRight+rightLen/2;
              var geo=new THREE.BoxGeometry(wd.isNS?rightLen:wallT,wallH,wd.isNS?wallT:rightLen);
              var m=new THREE.Mesh(geo,wallMat);
              m.position.set(wd.isNS?rc:wd.wallX, wallH/2, wd.isNS?wd.wallZ:rc);
              scene.add(m);threeMeshes.rooms.push(m);
            }
            var topH=wallH-h.height;
            if(topH>0.01){
              var geo=new THREE.BoxGeometry(wd.isNS?h.width:wallT,topH,wd.isNS?wallT:h.width);
              var m=new THREE.Mesh(geo,wallMat);
              m.position.set(wd.isNS?holeCenter:wd.wallX, h.height+topH/2, wd.isNS?wd.wallZ:holeCenter);
              scene.add(m);threeMeshes.rooms.push(m);
            }
            /* passage(通路) はドア本体を作らない */
            if(h.type !== 'door') return;
            var doorGeo=new THREE.BoxGeometry(wd.isNS?h.width:0.05,h.height,wd.isNS?0.05:h.width);
            /* ドアタイプで色分け */
            var hdt = h.doorType||'swing_left';
            var hIsSlide = (hdt==='slide'||hdt==='slide_left'||hdt==='slide_right');
            var hIsRightHinge = (hdt==='swing_right'||hdt==='swing_right_out');
            var doorColor = hIsSlide ? 0x4FA478
                          : hIsRightHinge ? 0x6B3410
                          : 0x8B4513;
            var dMat=new THREE.MeshLambertMaterial({color:doorColor});
            var dMesh=new THREE.Mesh(doorGeo,dMat);
            dMesh.position.set(wd.isNS?holeCenter:wd.wallX, h.height/2, wd.isNS?wd.wallZ:holeCenter);
            scene.add(dMesh);threeMeshes.rooms.push(dMesh);
            /* マーカー: スイングはヒンジ位置に橙(内)/水色(外)、引き戸はスライド方向に緑 */
            if(!hIsSlide){
              var isLeftHinge = !hIsRightHinge;
              var hingeSign = isLeftHinge ? -1 : 1;
              var markerX = wd.isNS ? (holeCenter + hingeSign*h.width/2) : wd.wallX;
              var markerZ = wd.isNS ? wd.wallZ : (holeCenter + hingeSign*h.width/2);
              var markGeo = new THREE.SphereGeometry(0.08,8,6);
              var hIsOut = (hdt==='swing_left_out'||hdt==='swing_right_out');
              var markMat = new THREE.MeshLambertMaterial({color: hIsOut ? 0x38BDF8 : 0xff6600});
              var mark = new THREE.Mesh(markGeo, markMat);
              mark.position.set(markerX, 0.08, markerZ);
              scene.add(mark); threeMeshes.rooms.push(mark);
            } else {
              var slideSign = hdt==='slide_right' ? 1 : -1;
              var slideX = wd.isNS ? (holeCenter + slideSign*h.width/2) : wd.wallX;
              var slideZ = wd.isNS ? wd.wallZ : (holeCenter + slideSign*h.width/2);
              var smGeo = new THREE.SphereGeometry(0.06,8,6);
              var smMat = new THREE.MeshLambertMaterial({color:0x10B981});
              var sm = new THREE.Mesh(smGeo, smMat);
              sm.position.set(slideX, 0.06, slideZ);
              scene.add(sm); threeMeshes.rooms.push(sm);
            }
          });
        }
      });
      var labelGeo=new THREE.PlaneGeometry(rw*0.8,0.5);
      var labelMat2=new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,opacity:0.5,transparent:true});
      var label=new THREE.Mesh(labelGeo,labelMat2);
      label.position.set(cx,0.05,cz);
      label.rotation.x=-Math.PI/2;
      scene.add(label);threeMeshes.rooms.push(label);
    }
  });
  furnitures.forEach(function(f){
    var fx=f.cx/BASE_SCALE, fz=f.cy/BASE_SCALE;
    var fw=f.w,fd=f.d,fh=f.h||0.8;
    var col=new THREE.Color(f.color);
    var geo=new THREE.BoxGeometry(fw,fh,fd);
    var mat=new THREE.MeshLambertMaterial({color:col});
    var mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(fx,fh/2,fz);
    mesh.rotation.y=f.rotation*Math.PI/180;
    scene.add(mesh);threeMeshes.furniture.push(mesh);
    var edges=new THREE.EdgesGeometry(geo);
    var line=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x000000,opacity:0.3,transparent:true}));
    line.position.copy(mesh.position);
    line.rotation.copy(mesh.rotation);
    scene.add(line);threeMeshes.furniture.push(line);
  });
  /* ━━━ 独立壁の3D描画 ━━━ */
  var wallMatFree=new THREE.MeshLambertMaterial({color:0xD0CCC0});
  walls.forEach(function(wl){
    var x1=wl.x1/BASE_SCALE, z1=-wl.y1/BASE_SCALE;
    var x2=wl.x2/BASE_SCALE, z2=-wl.y2/BASE_SCALE;
    var cx=(x1+x2)/2, cz=(z1+z2)/2;
    var dx=x2-x1, dz=z2-z1;
    var len=Math.sqrt(dx*dx+dz*dz);
    if(len<0.01) return;
    var angle=Math.atan2(dx,dz);
    var wh=2.4, wt=0.05;
    var g=new THREE.BoxGeometry(wt, wh, len);
    var m=new THREE.Mesh(g, wallMatFree);
    m.position.set(cx, wh/2, cz);
    m.rotation.y=angle;
    scene.add(m);threeMeshes.rooms.push(m);
  });
}

    wallStartPt=null;
    draw();
    document.getElementById('status').textContent='壁入力を中断しました';
  }
  /* ━━━ 囲みモード中の ESC でキャンセル ━━━ */

    drawing=false;
    draw();
    document.getElementById('status').textContent='囲み入力をキャンセルしました';
  }
  if(e.key==='r'||e.key==='R'){

      furnitures[draggingFurniture].rotation=(furnitures[draggingFurniture].rotation+90)%360;
      draw();rebuild3D();
    }
  }
  /* 編集モード: Delete/Backspace で選択中の頂点削除(多角形のみ、頂点数4以上の時) */
  if((e.key==='Delete'||e.key==='Backspace') && mode==='edit' && draggingVertex && draggingVertex.type==='poly'){
    var r=rooms[draggingVertex.roomIndex];
    if(r&&r.vertices&&r.vertices.length>3){
      r.vertices.splice(draggingVertex.vertexIndex,1);
      /* 開口の edgeIndex を補正 */
      (r.openings||[]).forEach(function(o){
        if(o.edgeIndex!==undefined && o.edgeIndex>=draggingVertex.vertexIndex){
          o.edgeIndex=Math.max(0,o.edgeIndex-1);
        }
      });
      draggingVertex=null;
      draw();rebuild3D();renderRoomList();
    }
  }

function confirmVertex(){

  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;

  rooms.push({id:roomCount++,name:names[rooms.length%names.length],wx:minX,wy:minY,ww:maxX-minX,wh:maxY-minY,vertices:vertices.map(function(v){return{x:v.x,y:v.y};}),color:COLORS[rooms.length%COLORS.length],openings:[],groupId:null});
  vertices=[];rebuild3D();renderRoomList();draw();

function snapToRooms(rx,ry,rw,rh){
  var snapDist=GRID*1.5;
  for(var i=0;i<rooms.length;i++){
    var sr=rooms[i];
    if(Math.abs(rx-(sr.wx+sr.ww))<snapDist)rx=sr.wx+sr.ww;
    if(Math.abs((rx+rw)-sr.wx)<snapDist)rw=sr.wx-rx;
    if(Math.abs(ry-(sr.wy+sr.wh))<snapDist)ry=sr.wy+sr.wh;
    if(Math.abs((ry+rh)-sr.wy)<snapDist)rh=sr.wy-ry;
    if(Math.abs(rx-sr.wx)<snapDist)rx=sr.wx;
    if(Math.abs((rx+rw)-(sr.wx+sr.ww))<snapDist)rw=(sr.wx+sr.ww)-rx;
    if(Math.abs(ry-sr.wy)<snapDist)ry=sr.wy;
    if(Math.abs((ry+rh)-(sr.wy+sr.wh))<snapDist)rh=(sr.wy+sr.wh)-ry;
  }
  return{rx:rx,ry:ry,rw:rw,rh:rh};
}
function getOpeningCanvasPos(room,opening){
  if(opening.edgeIndex!==undefined && room.vertices){
    var verts=room.vertices,i=opening.edgeIndex,j=(i+1)%verts.length;
    var ax=verts[i].x,ay=verts[i].y,bx=verts[j].x,by=verts[j].y;
    var t=opening.offsetAlongWall!==undefined?opening.offsetAlongWall:0.5;
    return{x:ax+(bx-ax)*t,y:ay+(by-ay)*t};
  }
  var isNS=opening.wall==='North'||opening.wall==='South';
  var wallLength=isNS?room.ww:room.wh;
  var along=opening.offsetAlongWall!==undefined?opening.offsetAlongWall:0.5;
  var ox,oy;
  if(opening.wall==='North'){ox=room.wx+along*wallLength;oy=room.wy;}
  else if(opening.wall==='South'){ox=room.wx+along*wallLength;oy=room.wy+room.wh;}
  else if(opening.wall==='East'){ox=room.wx+room.ww;oy=room.wy+along*wallLength;}
  else{ox=room.wx;oy=room.wy+along*wallLength;}
  return{x:ox,y:oy};
}
function findOpeningAt(wx,wy){
  var centerHit=15/scale;
  var endHit=10/scale;
  for(var ri=0;ri<rooms.length;ri++){
    var openings=rooms[ri].openings||[];
    for(var oi=0;oi<openings.length;oi++){
      var pos=getOpeningCanvasPos(rooms[ri],openings[oi]);
      var dx=wx-pos.x,dy=wy-pos.y;
      if(Math.sqrt(dx*dx+dy*dy)<centerHit) return{roomIndex:ri,openingIndex:oi,handle:'center'};
      /* 開口の左右端(幅変更ハンドル) */
      var ep=getOpeningEndpoints(rooms[ri],openings[oi]);
      if(ep){
        var lDx=wx-ep.left.x, lDy=wy-ep.left.y;
        if(Math.sqrt(lDx*lDx+lDy*lDy)<endHit) return{roomIndex:ri,openingIndex:oi,handle:'left'};
        var rDx=wx-ep.right.x, rDy=wy-ep.right.y;
        if(Math.sqrt(rDx*rDx+rDy*rDy)<endHit) return{roomIndex:ri,openingIndex:oi,handle:'right'};
      }
    }
  }
  return null;
}

/* 開口の左右端のキャンバス座標を返す(幅変更ハンドルの当たり判定+描画用) */
function getOpeningEndpoints(room,o){
  var pos=getOpeningCanvasPos(room,o);
  var halfW=(o.width||0.9)*BASE_SCALE/2;
  if(o.edgeIndex!==undefined && room.vertices){
    var verts=room.vertices,i=o.edgeIndex,j=(i+1)%verts.length;
    var dx=verts[j].x-verts[i].x, dy=verts[j].y-verts[i].y;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len<0.01) return null;
    var ndx=dx/len, ndy=dy/len;
    return {
      left:  {x: pos.x - ndx*halfW, y: pos.y - ndy*halfW},
      right: {x: pos.x + ndx*halfW, y: pos.y + ndy*halfW}
    };
  } else {
    var isNS=o.wall==='North'||o.wall==='South';
    if(isNS){
      return {left:{x:pos.x-halfW,y:pos.y}, right:{x:pos.x+halfW,y:pos.y}};
    } else {
      return {left:{x:pos.x,y:pos.y-halfW}, right:{x:pos.x,y:pos.y+halfW}};
    }
  }
}
function findFurnitureAt(wx,wy){
  for(var i=furnitures.length-1;i>=0;i--){
    var f=furnitures[i];
    var hw=f.pw/2,hh=f.ph/2;
    if(wx>=f.cx-hw&&wx<=f.cx+hw&&wy>=f.cy-hh&&wy<=f.cy+hh)return i;
  }
  return -1;
}

/* ━━━ 編集モード: 頂点ヒット判定 ━━━ */
function findVertexAt(wx,wy){
  var hitRadius=12/scale;
  for(var ri=rooms.length-1;ri>=0;ri--){
    var r=rooms[ri];
    if(r.vertices && r.vertices.length>=3){
      /* 多角形の頂点 */
      for(var vi=0;vi<r.vertices.length;vi++){
        var v=r.vertices[vi];
        var dx=wx-v.x, dy=wy-v.y;
        if(Math.sqrt(dx*dx+dy*dy)<hitRadius){
          return {roomIndex:ri, type:'poly', vertexIndex:vi};
        }
      }
    } else {
      /* 矩形の4隅 */
      var corners=[
        {name:'tl', x:r.wx,        y:r.wy},
        {name:'tr', x:r.wx+r.ww,   y:r.wy},
        {name:'br', x:r.wx+r.ww,   y:r.wy+r.wh},
        {name:'bl', x:r.wx,        y:r.wy+r.wh},
      ];
      for(var ci=0;ci<corners.length;ci++){
        var c=corners[ci];
        var dx=wx-c.x, dy=wy-c.y;
        if(Math.sqrt(dx*dx+dy*dy)<hitRadius){
          return {roomIndex:ri, type:'rect', corner:c.name};
        }
      }
    }
  }
  return null;
}

/* ━━━ 編集モード: 辺上の最近点を探す(クリックで頂点追加用)
   辺の中点だけでなく、辺のどこをクリックしても頂点を追加できる。
   矩形部屋も4辺を対象にする(必要時に多角形化) ━━━ */
function findPolygonEdgeMidpointAt(wx,wy){
  var hitDist=10/scale;  // 辺からこの距離以内なら追加
  var vertexAvoid=14/scale; // 頂点付近は除外(頂点ドラッグと競合しないよう)
  var best=null, bestD=hitDist;
  for(var ri=rooms.length-1;ri>=0;ri--){
    var r=rooms[ri];
    /* 頂点リストを用意(矩形はその場で仮想4頂点を作る) */
    var verts;
    if(r.vertices && r.vertices.length>=3){
      verts=r.vertices;
    } else {
      verts=[
        {x:r.wx,      y:r.wy},
        {x:r.wx+r.ww, y:r.wy},
        {x:r.wx+r.ww, y:r.wy+r.wh},
        {x:r.wx,      y:r.wy+r.wh}
      ];
    }
    for(var i=0;i<verts.length;i++){
      var j=(i+1)%verts.length;
      var ax=verts[i].x, ay=verts[i].y, bx=verts[j].x, by=verts[j].y;
      var abx=bx-ax, aby=by-ay;
      var lenSq=abx*abx+aby*aby;
      if(lenSq<1) continue;
      /* 点(wx,wy)を線分に投影 */
      var t=((wx-ax)*abx+(wy-ay)*aby)/lenSq;
      if(t<0.12||t>0.88) continue; // 端(頂点付近)は除外
      var px=ax+abx*t, py=ay+aby*t;
      var d=Math.sqrt((wx-px)*(wx-px)+(wy-py)*(wy-py));
      if(d<bestD){
        bestD=d;
        best={roomIndex:ri, edgeIndex:i, mx:px, my:py, isRect:!(r.vertices&&r.vertices.length>=3)};
      }
    }
  }
  return best;
}

/* ━━━ 矩形を多角形に変換(編集時に必要に応じて呼ぶ) ━━━ */
function convertRectToPolygon(roomIdx){
  var r=rooms[roomIdx];
  if(!r || r.vertices) return; /* 既に多角形 */
  r.vertices=[
    {x:r.wx,      y:r.wy},      // 0: 左上 (North wall = edge 0→1)
    {x:r.wx+r.ww, y:r.wy},      // 1: 右上 (East wall  = edge 1→2)
    {x:r.wx+r.ww, y:r.wy+r.wh}, // 2: 右下 (South wall = edge 2→3)
    {x:r.wx,      y:r.wy+r.wh}, // 3: 左下 (West wall  = edge 3→0)
  ];
  /* openings の wall ベースを edgeIndex ベースに変換 */
  (r.openings||[]).forEach(function(o){
    if(o.edgeIndex===undefined && o.wall){
      var wallToEdge={'North':0, 'East':1, 'South':2, 'West':3};
      o.edgeIndex = wallToEdge[o.wall];
      delete o.wall;
    }
  });
}
/* ━━━ 多角形の頂点変更後、バウンディングボックス(wx/wy/ww/wh)を再計算 ━━━ */
function updateRoomBBox(r){
  if(!r.vertices || r.vertices.length===0) return;
  var minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for(var i=0;i<r.vertices.length;i++){
    var v=r.vertices[i];
    minX=Math.min(minX,v.x); minY=Math.min(minY,v.y);
    maxX=Math.max(maxX,v.x); maxY=Math.max(maxY,v.y);
  }
  r.wx=minX; r.wy=minY; r.ww=maxX-minX; r.wh=maxY-minY;
}

canvas.addEventListener('mousedown',function(e){
  var cp=getCanvasPos(e);
  var mx=cp.x,my=cp.y;
  /* ━━━ 中クリック(ホイールボタン): どのモードでも一時パン ━━━ */
  if(e.button===1){
    e.preventDefault();
    isPanning=true;
    panStartX=mx; panStartY=my;
    panOriginX=offsetX; panOriginY=offsetY;
    wrap.style.cursor='grabbing';
    return;
  }
  /* ━━━ Shift+右クリック: 頂点モードで前の点と軸ロックして頂点追加 ━━━ */
  if(e.button===2 && shiftHeld && mode==='vertex' && vertices.length>0){
    var wRC=toWorld(mx,my);
    var prev=vertices[vertices.length-1];
    var dx=Math.abs(wRC.x - prev.x), dy=Math.abs(wRC.y - prev.y);
    var nx, ny;
    if(dx >= dy){
      /* 水平方向にロック: Y を前と完全に揃え、X はマウス位置 */
      nx = wRC.x; ny = prev.y;
    } else {
      /* 垂直方向にロック: X を前と完全に揃え、Y はマウス位置 */
      nx = prev.x; ny = wRC.y;
    }
    vertices.push({x:nx, y:ny});
    document.getElementById('status').textContent='頂点 '+vertices.length+'個 (軸ロック '+(dx>=dy?'横':'縦')+') / Enterで確定 / Escでキャンセル';
    draw();
    e.preventDefault();
    return;
  }
  /* それ以外の右クリックは無視(誤操作防止) */
  if(e.button===2) return;
  if(mode==='pan'){isPanning=true;panStartX=mx;panStartY=my;panOriginX=offsetX;panOriginY=offsetY;wrap.style.cursor='grabbing';return;}
  var w=toWorld(mx,my);
  /* ━━━ 背景調整モード: ドラッグで移動 ━━━ */
  if(mode==='bg' && bgImage){
    isDraggingBg=true;
    bgDragStartWX=w.x; bgDragStartWY=w.y;
    bgDragOriginX=bgX; bgDragOriginY=bgY;
    wrap.style.cursor='grabbing';
    return;
  }
  /* ━━━ 編集モード: 頂点ドラッグ or 辺中点クリックで頂点追加 ━━━ */
  if(mode==='edit'){
    var hit=findVertexAt(w.x,w.y);
    if(hit){
      draggingVertex=hit;
      wrap.style.cursor='grabbing';
      draw(); // 選択状態を表示
      return;
    }
    /* 辺をクリックしたら頂点追加(矩形部屋も対応) */
    var em=findPolygonEdgeMidpointAt(w.x,w.y);
    if(em){
      /* 矩形部屋なら先に多角形化 */
      if(em.isRect){
        convertRectToPolygon(em.roomIndex);
      }
      var r=rooms[em.roomIndex];
      /* スナップした座標で挿入 */
      var insX=snapWorld(em.mx), insY=snapWorld(em.my);
      r.vertices.splice(em.edgeIndex+1, 0, {x:insX, y:insY});
      /* 開口の edgeIndex を補正(挿入位置より後のものを +1) */
      (r.openings||[]).forEach(function(o){
        if(o.edgeIndex!==undefined && o.edgeIndex>em.edgeIndex){
          o.edgeIndex+=1;
        }
      });
      draggingVertex={roomIndex:em.roomIndex, type:'poly', vertexIndex:em.edgeIndex+1};
      wrap.style.cursor='grabbing';
      draw();rebuild3D();renderRoomList();
      document.getElementById('status').textContent='頂点を追加しました。ドラッグで位置調整できます';
      return;
    }
    document.getElementById('status').textContent='編集モード: 頂点や角をドラッグ / 辺をクリックで頂点追加 / 頂点選択中にDeleteで削除';
    return;
  }
  if(mode==='furniture'){
    var fi=findFurnitureAt(w.x,w.y);
    if(fi>=0){draggingFurniture=fi;dragFurnitureOffX=w.x-furnitures[fi].cx;dragFurnitureOffY=w.y-furnitures[fi].cy;wrap.style.cursor='grabbing';return;}
    if(selectedFurnitureType){
      furnitures.push({
        id:furnitureCount++,type:selectedFurnitureType.id,name:selectedFurnitureType.name,
        icon:selectedFurnitureType.icon,cx:snapWorld(w.x),cy:snapWorld(w.y),
        pw:selectedFurnitureType.w*BASE_SCALE,ph:selectedFurnitureType.d*BASE_SCALE,
        w:selectedFurnitureType.w,d:selectedFurnitureType.d,h:selectedFurnitureType.h||0.8,
        rotation:0,color:selectedFurnitureType.color
      });
      draw();rebuild3D();renderRoomList();
    }
    return;
  }
  /* ━━━ 壁モード: クリックで点を打って独立壁を作る ━━━ */
  if(mode==='wall'){
    var nxW=snapWorld(w.x), nyW=snapWorld(w.y);
    if(wallStartPt===null){
      wallStartPt={x:nxW, y:nyW};
      document.getElementById('status').textContent='壁: 終点をクリック / ESCで中断';
      draw();
      return;
    }
    /* 同じ点をクリックしたらキャンセル */
    if(Math.abs(nxW-wallStartPt.x)<5 && Math.abs(nyW-wallStartPt.y)<5){
      wallStartPt=null;
      document.getElementById('status').textContent='壁: クリックで始点';
      draw();
      return;
    }
    /* Shift で軸ロック */
    var endX=nxW, endY=nyW;
    if(shiftHeld){
      var dxL=Math.abs(nxW-wallStartPt.x), dyL=Math.abs(nyW-wallStartPt.y);
      if(dxL>=dyL){ endY=wallStartPt.y; } else { endX=wallStartPt.x; }
    }
    walls.push({id:nextWallId++, x1:wallStartPt.x, y1:wallStartPt.y, x2:endX, y2:endY});
    /* 連続入力: 終点が次の始点に */
    wallStartPt={x:endX, y:endY};
    document.getElementById('status').textContent='壁 '+walls.length+'本 作成 / 次の終点をクリック / ESCで中断';
    draw();rebuild3D();renderRoomList();
    return;
  }
  if(mode==='door'||mode==='window'||mode==='passage'){
    var hit=findOpeningAt(w.x,w.y);
    if(hit){
      draggingOpening=hit;
      wrap.style.cursor = (hit.handle==='left'||hit.handle==='right') ? 'ew-resize' : 'grabbing';
      return;
    }
    var room=getRoomAt(w.x,w.y);
    if(room){
      if(!room.openings)room.openings=[];
      /* type別のデフォルト値: 通路は壁全体の高さ・広めの幅 */
      var defaultW = mode==='door' ? 0.9 : mode==='window' ? 1.2 : 1.5;
      var defaultH = mode==='door' ? 2.0 : mode==='window' ? 1.0 : 2.4; // 通路は壁高
      if(room.vertices&&room.vertices.length>=3){
        var ev=getClosestPolygonEdge(room,w.x,w.y);
        var opening = {type:mode, edgeIndex:ev.edgeIndex, offsetAlongWall:Math.max(0.05,Math.min(0.95,ev.along)), width:defaultW, height:defaultH};
        if(mode==='door') opening.doorType=currentDoorType;
        room.openings.push(opening);
      } else {
        var wall=getClosestWall(room,w.x,w.y);
        var isNS=wall==='North'||wall==='South';
        var wallLength=isNS?room.ww:room.wh;
        var along=isNS?(w.x-room.wx)/wallLength:(w.y-room.wy)/wallLength;
        along=Math.max(0.05,Math.min(0.95,along));
        var opening = {type:mode, wall:wall, offsetAlongWall:along, width:defaultW, height:defaultH};
        if(mode==='door') opening.doorType=currentDoorType;
        room.openings.push(opening);
      }
      draw();rebuild3D();renderRoomList();
    }
    return;
  }
  if(mode==='rect'){var wx=snapWorld(w.x),wy=snapWorld(w.y);drawing=true;startX=wx;startY=wy;curX=wx;curY=wy;}
  if(mode==='vertex'){
    var now=Date.now(),wx2=snapWorld(w.x),wy2=snapWorld(w.y);
    if(now-lastClickTime<300&&vertices.length>=3){confirmVertex();lastClickTime=0;return;}
    lastClickTime=now;
    if(vertices.length>=3){var first=vertices[0],dx=(wx2-first.x)*scale,dy=(wy2-first.y)*scale;if(Math.sqrt(dx*dx+dy*dy)<15){confirmVertex();return;}}
    vertices.push({x:wx2,y:wy2});
    document.getElementById('status').textContent='頂点 '+vertices.length+'個 / Enterで確定 / Escでキャンセル';
    draw();
  }
});
canvas.addEventListener('mousemove',function(e){
  var cp=getCanvasPos(e);
  var mx=cp.x,my=cp.y;
  rawMouseX=mx;rawMouseY=my;
  if(isPanning){offsetX=panOriginX+(mx-panStartX);offsetY=panOriginY+(my-panStartY);draw();return;}
  var w=toWorld(mx,my);
  /* ━━━ 背景調整モード: ドラッグ中の移動 ━━━ */
  if(isDraggingBg){
    bgX = bgDragOriginX + (w.x - bgDragStartWX);
    bgY = bgDragOriginY + (w.y - bgDragStartWY);
    draw();
    return;
  }
  /* ━━━ 編集モード: 頂点ドラッグ中 ━━━ */
  if(draggingVertex){
    var nx=snapWorld(w.x), ny=snapWorld(w.y);
    var r=rooms[draggingVertex.roomIndex];
    if(draggingVertex.type==='poly' && r.vertices){
      r.vertices[draggingVertex.vertexIndex].x = nx;
      r.vertices[draggingVertex.vertexIndex].y = ny;
      /* 矩形バウンディングボックスも更新(他処理が wx/wy/ww/wh を参照するため) */
      updateRoomBBox(r);
    } else if(draggingVertex.type==='rect'){
      var c=draggingVertex.corner;
      /* 対角を固定して反対側を動かす */
      var leftX=r.wx, topY=r.wy, rightX=r.wx+r.ww, bottomY=r.wy+r.wh;
      if(c==='tl'){ leftX=nx; topY=ny; }
      else if(c==='tr'){ rightX=nx; topY=ny; }
      else if(c==='br'){ rightX=nx; bottomY=ny; }
      else if(c==='bl'){ leftX=nx; bottomY=ny; }
      /* 反転を防ぐ */
      if(rightX<=leftX+GRID/4 || bottomY<=topY+GRID/4){ return; }
      r.wx=leftX; r.wy=topY; r.ww=rightX-leftX; r.wh=bottomY-topY;
    }
    draw();rebuild3D();
    return;
  }
  if(draggingFurniture!==null){furnitures[draggingFurniture].cx=snapWorld(w.x-dragFurnitureOffX);furnitures[draggingFurniture].cy=snapWorld(w.y-dragFurnitureOffY);draw();rebuild3D();return;}
  if(draggingOpening!==null){
    var r=rooms[draggingOpening.roomIndex],o=r.openings[draggingOpening.openingIndex];
    var handle=draggingOpening.handle||'center';
    /* ━━━ 端ハンドルをドラッグ: 幅を変更(中心位置は固定) ━━━ */
    if(handle==='left'||handle==='right'){
      var pos=getOpeningCanvasPos(r,o);
      var dxC=w.x-pos.x, dyC=w.y-pos.y;
      var distCanvas=Math.sqrt(dxC*dxC+dyC*dyC);
      var newW=(distCanvas*2)/BASE_SCALE; // メートル単位
      o.width=Math.max(0.3, Math.min(5.0, newW));
      draw();renderRoomList();return;
    }
    /* ━━━ 中心ハンドル(=従来通り位置移動) ━━━ */
    if(o.edgeIndex!==undefined && r.vertices){
      var verts=r.vertices,i=o.edgeIndex,j=(i+1)%verts.length;
      var ax=verts[i].x,ay=verts[i].y,bx=verts[j].x,by=verts[j].y;
      var dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
      var t=len2>0?((w.x-ax)*dx+(w.y-ay)*dy)/len2:0.5;
      o.offsetAlongWall=Math.max(0.05,Math.min(0.95,t));draw();return;
    }
    var isNS=o.wall==='North'||o.wall==='South';
    var wallLength=isNS?r.ww:r.wh;
    var along=isNS?(w.x-r.wx)/wallLength:(w.y-r.wy)/wallLength;
    along=Math.max(0.05,Math.min(0.95,along));
    o.offsetAlongWall=along;draw();return;
  }
  if(mode==='rect'&&drawing){curX=snapWorld(w.x);curY=snapWorld(w.y);draw();}
  if(mode==='vertex'){cursorX=snapWorld(w.x);cursorY=snapWorld(w.y);draw();}
  if(mode==='wall'){cursorX=snapWorld(w.x);cursorY=snapWorld(w.y);if(wallStartPt)draw();}
  /* ━━━ ドア/窓/通路モード: 壁ホバーで設置プレビューを計算 ━━━ */
  if(mode==='door'||mode==='window'||mode==='passage'){
    var prevPreview=openingPreview;
    openingPreview=computeOpeningPreview(w.x,w.y);
    /* プレビュー内容が変わった時だけ再描画(負荷軽減) */
    if(JSON.stringify(prevPreview)!==JSON.stringify(openingPreview)) draw();
  } else if(openingPreview){
    openingPreview=null; draw();
  }
});

/* ドア/窓/通路の設置プレビュー位置を計算 */
function computeOpeningPreview(wx,wy){
  var room=getRoomAt(wx,wy);
  if(!room) return null;
  var defW = mode==='door' ? (currentDoorType&&currentDoorType.indexOf('slide')===0?0.9:0.9) : mode==='window' ? 1.2 : 1.5;
  var defH = mode==='door' ? 2.0 : mode==='window' ? 1.0 : 2.4;
  if(room.vertices&&room.vertices.length>=3){
    var ev=getClosestPolygonEdge(room,wx,wy);
    if(!ev) return null;
    return {kind:'poly', roomIndex:rooms.indexOf(room), edgeIndex:ev.edgeIndex,
            along:Math.max(0.05,Math.min(0.95,ev.along)), width:defW, height:defH,
            type:mode, doorType:(mode==='door'?currentDoorType:null)};
  } else {
    var wall=getClosestWall(room,wx,wy);
    var isNS=wall==='North'||wall==='South';
    var wallLength=isNS?room.ww:room.wh;
    var along=isNS?(wx-room.wx)/wallLength:(wy-room.wy)/wallLength;
    along=Math.max(0.05,Math.min(0.95,along));
    return {kind:'rect', roomIndex:rooms.indexOf(room), wall:wall,
            along:along, width:defW, height:defH,
            type:mode, doorType:(mode==='door'?currentDoorType:null)};
  }
}

canvas.addEventListener('mouseup',function(e){
  if(isPanning){isPanning=false;wrap.style.cursor=mode==='pan'?'grab':'crosshair';return;}

    if(mode!=='edit'){ draggingVertex=null; }

  }

/* ドア/窓/通路の設置プレビューを半透明で描く */
function drawOpeningPreview(pv){

    ? {edgeIndex:pv.edgeIndex, offsetAlongWall:pv.along, width:pv.width}

  var pos=getOpeningCanvasPos(r,tmpO);
  if(!pos) return;
  var dt=pv.doorType||'swing_left';
  var isSlide=(dt.indexOf('slide')===0);
  var isRightHinge=(dt==='swing_right'||dt==='swing_right_out');
  var isOut=(dt==='swing_left_out'||dt==='swing_right_out');
  var baseColor = pv.type==='door' ? (isSlide?'#4FA478':isRightHinge?'#A0522D':'#1D9E75')
                : pv.type==='passage' ? '#9333EA' : '#185FA5';
  ctx.save();
  ctx.globalAlpha=0.5;
  /* 角度を求める */
  var ang;

    var verts=r.vertices,i=pv.edgeIndex,j=(i+1)%verts.length;
    ang=Math.atan2(verts[j].y-verts[i].y, verts[j].x-verts[i].x);

    ang=isNS?0:Math.PI/2;
  }
  ctx.translate(pos.x,pos.y);ctx.rotate(ang);
  /* 開口本体 */
  ctx.fillStyle=baseColor;
  ctx.fillRect(-ow/2,-t/2,ow,t);
  /* スイングドアなら開くアークを点線で */
  if(pv.type==='door' && !isSlide){
    /* 部屋の重心方向(内側)を判定 */
    var cxSum=0,cySum=0,vc;
    if(pv.kind==='poly'){ r.vertices.forEach(function(v){cxSum+=v.x;cySum+=v.y;}); vc=r.vertices.length; }
    else { cxSum=(r.wx+r.ww/2)*4; cySum=(r.wy+r.wh/2)*4; vc=4; }
    var rCX=cxSum/vc, rCY=cySum/vc;
    var dxC=rCX-pos.x, dyC=rCY-pos.y;
    var localCY=-Math.sin(ang)*dxC+Math.cos(ang)*dyC;
    var innerSign=localCY>0?1:-1;
    var arcSide=isOut?-innerSign:innerSign;
    var hingeSign=isRightHinge?1:-1;
    var hingeX=hingeSign*ow/2;
    var startA=(hingeSign===-1)?0:Math.PI;
    var endA=startA+(arcSide>0?Math.PI/2:-Math.PI/2);
    ctx.strokeStyle=baseColor;ctx.lineWidth=1.5/scale;ctx.setLineDash([4/scale,3/scale]);
    ctx.beginPath();ctx.arc(hingeX,0,ow,startA,endA,arcSide<0);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(hingeX,0);ctx.lineTo(hingeX,arcSide*ow);ctx.stroke();
    /* ヒンジ点 */
    ctx.fillStyle=isOut?'#38BDF8':'#FF6B00';
    ctx.beginPath();ctx.arc(hingeX,0,4/scale,0,Math.PI*2);ctx.fill();
  }
  if(pv.type==='door' && isSlide){
    var slideSign=(dt==='slide_right')?1:-1;
    ctx.fillStyle='#10B981';
    ctx.beginPath();ctx.arc(slideSign*ow/2,0,4/scale,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold '+(8/scale)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(slideSign>0?'→':'←',0,0);ctx.textBaseline='alphabetic';
  }
  ctx.restore();
  /* プレビューの外枠(点線)で「これから置くもの」感を出す */
  ctx.save();
  ctx.globalAlpha=0.9;
  ctx.translate(pos.x,pos.y);ctx.rotate(ang);
  ctx.strokeStyle=baseColor;ctx.lineWidth=1.5/scale;ctx.setLineDash([5/scale,3/scale]);
  ctx.strokeRect(-ow/2,-t/2,ow,t);
  ctx.setLineDash([]);
  ctx.restore();
}
function toUnityCoords(wx,wy,ww,wh){return{x:wx/BASE_SCALE,y:-(wy+wh)/BASE_SCALE,width:ww/BASE_SCALE,depth:wh/BASE_SCALE};}
async function sendData(silent){
  var data={
    floorplan:{floors:[{floor:1,rooms:rooms.map(function(r){
      var uc=toUnityCoords(r.wx,r.wy,r.ww,r.wh);
      var unityVerts=r.vertices?r.vertices.map(function(v){return{x:v.x/BASE_SCALE,z:-v.y/BASE_SCALE};}):null;
      return{id:'room_'+r.id,name:r.name,x:uc.x,y:uc.y,width:uc.width,depth:uc.depth,height:2.4,groupId:r.groupId||null,vertices:unityVerts,
        openings:(r.openings||[]).map(function(o){
          if(o.edgeIndex!==undefined){
            return{type:o.type,edgeIndex:o.edgeIndex,offsetAlongWall:(o.offsetAlongWall!==undefined?o.offsetAlongWall:0.5),width:o.width,height:o.height,doorType:o.doorType};
          }
          var isNS=o.wall==='North'||o.wall==='South';
          var wallLength=isNS?r.ww:r.wh;
          var along=o.offsetAlongWall!==undefined?o.offsetAlongWall:0.5;
          return{type:o.type,wall:o.wall,offsetAlongWall:along*(wallLength/BASE_SCALE),width:o.width,height:o.height,doorType:o.doorType};
        })};
    }),walls:walls.map(function(wl){
      return{
        x1: wl.x1/BASE_SCALE, z1: -wl.y1/BASE_SCALE,
        x2: wl.x2/BASE_SCALE, z2: -wl.y2/BASE_SCALE,
        thickness: 0.05, height: 2.4
      };
    })}]},
    furniture:furnitures.map(function(f){return{id:'furniture_'+f.id,type:f.type,name:f.name,x:f.cx/BASE_SCALE,y:-f.cy/BASE_SCALE,width:f.w,depth:f.d,height:f.h,rotation:f.rotation};})
  };
  try{
    var res=await fetch(SERVER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(res.ok){
      var msg='✓ 送信完了（部屋:'+rooms.length+' 家具:'+furnitures.length+' 壁:'+walls.length+'）';
      document.getElementById('status').textContent=msg;
      if(silent || VR_VIEW_MODE){
        postToParent({type:'vr-editor-sent', message:msg});
      }
    }
  }catch(e){document.getElementById('status').textContent='エラー：サーバー確認してください';}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   全体サイズ調整(スライダーで部屋・壁・家具を一括で拡縮)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
var scaleModeOrig = null;
var scaleModeAnchor = {x:0, y:0};

/* スケールモード進入時:現在の座標をディープコピーで保持 */
function enterScaleMode(){
  /* 全要素のバウンディングボックス中心をスケール基準点に */
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  rooms.forEach(function(r){
    if(r.vertices){
      r.vertices.forEach(function(v){minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);});
    } else {
      minX=Math.min(minX,r.wx);minY=Math.min(minY,r.wy);maxX=Math.max(maxX,r.wx+r.ww);maxY=Math.max(maxY,r.wy+r.wh);
    }
  });
  walls.forEach(function(w){minX=Math.min(minX,w.x1,w.x2);minY=Math.min(minY,w.y1,w.y2);maxX=Math.max(maxX,w.x1,w.x2);maxY=Math.max(maxY,w.y1,w.y2);});
  furnitures.forEach(function(f){
    var hw=(f.pw||50)/2, hh=(f.ph||50)/2;
    minX=Math.min(minX,f.cx-hw);minY=Math.min(minY,f.cy-hh);maxX=Math.max(maxX,f.cx+hw);maxY=Math.max(maxY,f.cy+hh);
  });
  if(minX===Infinity){ minX=0;minY=0;maxX=0;maxY=0; }
  scaleModeAnchor.x = (minX+maxX)/2;
  scaleModeAnchor.y = (minY+maxY)/2;
  /* ディープコピーで元データを保持(スライダー操作時に毎回ここから再計算) */
  scaleModeOrig = {
    rooms: JSON.parse(JSON.stringify(rooms)),
    walls: JSON.parse(JSON.stringify(walls)),
    furnitures: JSON.parse(JSON.stringify(furnitures))
  };
  /* スライダーを 100% にリセット */
  var sl=document.getElementById('globalScaleSlider'); if(sl) sl.value=100;
  var inp=document.getElementById('globalScaleInput'); if(inp) inp.value=100;
}

/* スケールモード退出時:現在の状態を確定(バックアップ破棄) */
function commitScaleMode(){
  scaleModeOrig = null;
}

/* スライダー操作:元データを基準に倍率 s で全要素を再計算 */
function applyGlobalScale(s){
  if(!scaleModeOrig) return;
  var ax=scaleModeAnchor.x, ay=scaleModeAnchor.y;
  /* 部屋 */
  rooms = JSON.parse(JSON.stringify(scaleModeOrig.rooms));
  rooms.forEach(function(r){
    if(r.vertices){
      r.vertices.forEach(function(v){
        v.x = ax + (v.x - ax) * s;
        v.y = ay + (v.y - ay) * s;
      });
      /* wx/wy/ww/wh を再計算 */
      var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      r.vertices.forEach(function(v){minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);});
      r.wx=minX; r.wy=minY; r.ww=maxX-minX; r.wh=maxY-minY;
    } else {
      r.wx = ax + (r.wx - ax) * s;
      r.wy = ay + (r.wy - ay) * s;
      r.ww *= s;
      r.wh *= s;
    }
    /* 開口の幅もスケール(物理サイズ) */
    if(r.openings){
      r.openings.forEach(function(o){ if(o.width) o.width *= s; if(o.height) o.height *= s; });
    }
  });
  /* 壁 */
  walls = JSON.parse(JSON.stringify(scaleModeOrig.walls));
  walls.forEach(function(w){
    w.x1 = ax + (w.x1 - ax) * s;
    w.y1 = ay + (w.y1 - ay) * s;
    w.x2 = ax + (w.x2 - ax) * s;
    w.y2 = ay + (w.y2 - ay) * s;
  });
  /* 家具 */
  furnitures = JSON.parse(JSON.stringify(scaleModeOrig.furnitures));
  furnitures.forEach(function(f){
    f.cx = ax + (f.cx - ax) * s;
    f.cy = ay + (f.cy - ay) * s;
    if(f.pw) f.pw *= s; if(f.ph) f.ph *= s;
    if(f.w) f.w *= s; if(f.d) f.d *= s; if(f.h) f.h *= s;
  });
  draw(); rebuild3D(); renderRoomList();
}

/* スライダーリセット(100% に戻す) */
function resetGlobalScale(){
  if(!scaleModeOrig) return;
  applyGlobalScale(1.0);
  var sl=document.getElementById('globalScaleSlider'); if(sl) sl.value=100;
  var inp=document.getElementById('globalScaleInput'); if(inp) inp.value=100;
}

/* スライダーと数値入力の双方向同期 */
window.addEventListener('load', function(){
  var sl = document.getElementById('globalScaleSlider');
  var inp = document.getElementById('globalScaleInput');
  if(!sl || !inp) return;
  /* スライダー → 数値入力 + 反映 */
  sl.addEventListener('input', function(){
    var pct = parseInt(this.value);
    inp.value = pct;
    applyGlobalScale(pct / 100);
  });
  /* 数値入力 → スライダー + 反映 */
  inp.addEventListener('input', function(){
    var pct = parseInt(this.value);
    if(isNaN(pct)) return;
    pct = Math.max(10, Math.min(500, pct));
    sl.value = pct;
    applyGlobalScale(pct / 100);
  });
  /* 数値入力フォーカス離脱時に範囲外を補正 */
  inp.addEventListener('change', function(){
    var pct = parseInt(this.value);
    if(isNaN(pct)) pct = 100;
    pct = Math.max(10, Math.min(500, pct));
    this.value = pct;
    sl.value = pct;
    applyGlobalScale(pct / 100);
  });
});

/* ━━━ 色選択パレットをポップアップ表示 ━━━ */
function toggleColorPalette(roomIdx, ev){
  /* 既存のパレットがあれば閉じる */
  var existing = document.getElementById('color-palette-popup');
  if(existing){
    var prevRoom = existing.getAttribute('data-room');
    existing.remove();
    if(prevRoom === String(roomIdx)) return; // 同じ部屋なら閉じるだけ
  }
  var anchor = ev.target;
  var rect = anchor.getBoundingClientRect();
  var pop = document.createElement('div');
  pop.id = 'color-palette-popup';
  pop.setAttribute('data-room', String(roomIdx));
  pop.style.cssText = 'position:fixed;left:'+(rect.left)+'px;top:'+(rect.bottom+4)+'px;'
    + 'background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px;'
    + 'box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:10000;'
    + 'display:grid;grid-template-columns:repeat(4,18px);gap:4px';
  COLOR_PALETTE.forEach(function(col){
    var sw = document.createElement('span');
    sw.style.cssText = 'display:inline-block;width:18px;height:18px;background:'+col+';'
      + 'border:1px solid rgba(0,0,0,.15);border-radius:3px;cursor:pointer';
    sw.title = col;
    sw.onclick = function(e){
      e.stopPropagation();
      setRoomColor(roomIdx, col);
      pop.remove();
    };
    pop.appendChild(sw);
  });
  document.body.appendChild(pop);
  /* 外側クリックで閉じる */
  setTimeout(function(){
    var closeHandler = function(e){
      if(!pop.contains(e.target)){
        pop.remove();
        document.removeEventListener('mousedown', closeHandler);
      }
    };
    document.addEventListener('mousedown', closeHandler);
  }, 0);
}

  }
  if(rooms.length===0&&furnitures.length===0)
    html='<div style="padding:4px 8px;color:#aaa;font-size:11px">部屋・家具がありません</div>';
  p.innerHTML=html;
}
function clearAll(){rooms=[];furnitures=[];roomCount=0;furnitureCount=0;draw();rebuild3D();renderRoomList();document.getElementById('status').textContent='クリアしました';}
initThree();
setMode('rect');
draw();
renderRoomList();
</script>
